<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Az1kDev — Admin Panel</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="../logo.jpg" alt="Az1kDev" class="admin-logo-img" onerror="this.style.display='none'"/>
        <span>Az1kDev</span>
      </div>
      <nav class="admin-nav">
        <button class="admin-nav-item active" data-tab="posts">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Yangiliklar
        </button>
        <button class="admin-nav-item" data-tab="orders">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Bot Buyurtmalar
          <span class="nav-unread" id="navOrdersBadge" style="display:none">●</span>
        </button>
        <button class="admin-nav-item" data-tab="plugins">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93A10 10 0 0 1 19.07 19.07"/></svg>
          Pluginlar
        </button>
        <button class="admin-nav-item" data-tab="support">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Support Chatlar
          <span class="nav-unread" id="navUnread" style="display:none">●</span>
        </button>
      </nav>
      <button class="admin-logout" id="adminLogout">Chiqish</button>
    </aside>

    <div class="admin-content">

      <!-- POSTS TAB -->
      <div class="admin-tab active" id="tab-posts">
        <div class="admin-tab-header">
          <h2>Yangiliklar boshqaruvi</h2>
          <button class="btn-primary" id="openAddPost">+ Yangilik qo'shish</button>
        </div>
        <div class="admin-posts-list" id="adminPostsList"></div>
      </div>

      <!-- BOT ORDERS TAB -->
      <div class="admin-tab" id="tab-orders">
        <div class="admin-tab-header">
          <h2>Bot Buyurtmalar</h2>
          <span class="badge" id="ordersBadge">0 ta</span>
        </div>
        <div id="adminOrdersList" style="display:flex;flex-direction:column;gap:14px"></div>
      </div>

      <!-- PLUGINS TAB -->
      <div class="admin-tab" id="tab-plugins">
        <div class="admin-tab-header">
          <h2>Pluginlar &amp; Zborkalar</h2>
          <button class="btn-primary" id="openAddPlugin">+ Plugin qo'shish</button>
        </div>
        <div class="admin-plugins-list" id="adminPluginsList"></div>
      </div>

      <!-- SUPPORT TAB -->
      <div class="admin-tab" id="tab-support">
        <div class="admin-tab-header">
          <h2>Support Chatlar</h2>
          <span class="badge" id="unreadBadge">0 yangi</span>
        </div>
        <div class="support-layout">
          <div class="support-users" id="supportUsers">
            <div class="empty-support">Hali hech kim yozmagan</div>
          </div>
          <div class="support-chat-area">
            <div class="support-chat-top"><span id="activeChatName">Chat tanlang</span></div>
            <div class="support-messages" id="adminChatMessages">
              <div class="admin-chat-empty">Chapdan foydalanuvchini tanlang</div>
            </div>
            <div class="support-reply-row" id="replyRow" style="display:none">
              <input type="text" id="adminReply" placeholder="Javob yozing..." class="chat-input" />
              <button id="sendAdminReply" class="chat-send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ADD POST MODAL -->
  <div class="modal-overlay" id="addPostModal">
    <div class="modal-box" style="max-width:560px">
      <div class="modal-header">
        <span id="addPostModalTitle">✏️ Yangilik qo'shish</span>
        <button class="modal-close" id="closeAddPost">✕</button>
      </div>
      <div class="admin-form">
        <div class="form-group">
          <label>Matn *</label>
          <textarea id="postText" placeholder="Yangilik matni..." rows="5"></textarea>
        </div>
        <div class="form-group">
          <label>Rasm URL (ixtiyoriy)</label>
          <input type="text" id="postImage" placeholder="https://example.com/rasm.jpg" />
        </div>
        <div class="form-group">
          <label>Havola (ixtiyoriy)</label>
          <input type="text" id="postLink" placeholder="https://..." />
        </div>
        <input type="hidden" id="editPostId" value="" />
        <button class="btn-primary full" id="savePost">Saqlash</button>
      </div>
    </div>
  </div>

  <!-- ADD PLUGIN MODAL -->
  <div class="modal-overlay" id="addPluginModal">
    <div class="modal-box">
      <div class="modal-header">
        <span>Plugin / Zbora qo'shish</span>
        <button class="modal-close" id="closeAddPlugin">✕</button>
      </div>
      <div class="admin-form">
        <div class="form-group">
          <label>Nomi *</label>
          <input type="text" id="pName" placeholder="Plugin nomi" />
        </div>
        <div class="form-group">
          <label>Tavsif</label>
          <textarea id="pDesc" placeholder="Qisqacha tavsif" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Turi</label>
          <select id="pType">
            <option value="plugin">Plugin</option>
            <option value="zbora">Zbora</option>
          </select>
        </div>
        <div class="form-group">
          <label>Yuklab olish linki</label>
          <input type="text" id="pLink" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label>Rasm URL (ixtiyoriy)</label>
          <input type="text" id="pImage" placeholder="https://..." />
        </div>
        <button class="btn-primary full" id="savePlugin">Saqlash</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
